# ─────────────────────────────────────────────────────────────
#  Rusty — MkDocs configuration
#  Material for MkDocs, reskinned to match the Rusty brand.
# ─────────────────────────────────────────────────────────────
site_name: Rusty Docs
site_description: A coding agent that never leaves your terminal.
site_url: https://docs.rustycli.com
copyright: © 2026 PDG Global Limited · Made in the terminal

repo_url: https://github.com/pdg-global/rusty
repo_name: pdg-global/rusty
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site-docs

theme:
  name: material
  custom_dir: overrides
  logo: assets/rusty-mark.svg
  favicon: assets/favicon.svg

  font:
    text: Hanken Grotesk
    code: JetBrains Mono

  palette:
    # Daylight (light)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to Ember (dark)
    # Ember (dark)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to Daylight (light)

  icon:
    repo: fontawesome/brands/github

  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/rusty.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pdg-global/rusty

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      permalink_title: Link to this section

plugins:
  - search

nav:
  - Getting Started:
      - Introduction: index.md
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Configuration:
      - Settings: configuration/settings.md
      - Credentials: configuration/credentials.md
      - Presets: configuration/presets.md
      - Permissions: configuration/permissions.md
  - Tools:
      - Overview: tools/overview.md
      - File Operations: tools/file-operations.md
      - Bash: tools/bash.md
      - Search: tools/search.md
      - Web Fetch: tools/web-fetch.md
      - Sub-Agents: tools/sub-agents.md
      - Task Management: tools/task-management.md
  - Guides:
      - Agent Loop: guides/agent-loop.md
      - Running Modes: guides/running-modes.md
      - Sessions: guides/sessions.md
      - Slash Commands: guides/slash-commands.md
  - Reference:
      - CLI Flags: reference/cli.md
